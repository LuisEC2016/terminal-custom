<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>

  <!-- ── Bloquear fuentes que compiten con Nerd Font en el rango PUA ────────────
       PowerlineSymbols.otf viene preinstalado y Pango lo prefiere sobre la NF
       para U+E0B0-U+E0B3, causando que los separadores se rendericen con métricas
       incorrectas (aparecen como rectángulos en lugar de triángulos).
       STIX Two Math también cubre parte del rango PUA.                        -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>PowerlineSymbols</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>STIX Two Math</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>

  <!-- ── Cadena de fallback para RobotoMono Nerd Font Mono ─────────────────────
       Garantiza que Pango use la NF primero para cualquier codepoint.          -->
  <alias>
    <family>RobotoMono Nerd Font Mono</family>
    <prefer>
      <family>RobotoMono Nerd Font Mono</family>
      <family>DejaVu Sans Mono</family>
      <family>Noto Sans Symbols2</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <alias>
    <family>RobotoMono Nerd Font</family>
    <prefer>
      <family>RobotoMono Nerd Font</family>
      <family>RobotoMono Nerd Font Mono</family>
      <family>DejaVu Sans Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- ── Quitar el rango PUA (U+E000–F8FF) de fuentes que lo cubren parcialmente
       para que no compitan con la Nerd Font en fallback de Pango.              -->
  <match target="scan">
    <test name="family"><string>DejaVu Sans</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset><range><int>0xE000</int><int>0xF8FF</int></range></charset>
      </minus>
    </edit>
  </match>

  <match target="scan">
    <test name="family"><string>DejaVu Sans Mono</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset><range><int>0xE000</int><int>0xF8FF</int></range></charset>
      </minus>
    </edit>
  </match>

  <match target="scan">
    <test name="family"><string>Ubuntu Sans Mono</string></test>
    <edit name="charset" mode="assign">
      <minus>
        <name>charset</name>
        <charset><range><int>0xE000</int><int>0xF8FF</int></range></charset>
      </minus>
    </edit>
  </match>

</fontconfig>
