# ── Pixegami tmux config ──────────────────────────────────────────────────────
# Prefijo: Ctrl+A (más ergonómico que Ctrl+B)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal y colores ────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 50000
set -g escape-time 10          # reducir lag de Escape (importante en vim/nvim)
set -g focus-events on         # pasar focus events al editor
set -g mouse on                # ratón: scroll, resize, clic en panel

# ── Numeración desde 1 ────────────────────────────────────────────────────────
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on     # renumerar ventanas al cerrar

# ── Splits con teclas intuitivas ──────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"   # | divide horizontal
bind - split-window -v -c "#{pane_current_path}"   # - divide vertical
bind c new-window -c "#{pane_current_path}"         # nueva ventana en dir actual
unbind '"'
unbind %

# ── Navegación entre paneles con Ctrl+hjkl (igual que vim) ───────────────────
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# ── Cambio de ventanas con Shift+flechas ─────────────────────────────────────
bind -n S-Left  previous-window
bind -n S-Right next-window

# ── Redimensionar paneles con Alt+hjkl ───────────────────────────────────────
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ── Recargar config sin reiniciar ─────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Configuración recargada"

# ── Copiar modo vi ────────────────────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "wl-copy 2>/dev/null || xclip -in -selection clipboard"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# ── Status bar: paleta Pixegami ───────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style "bg=#0d1b26,fg=#a8e6c0"

# Lado izquierdo: sesión
set -g status-left-length 40
set -g status-left "#[bg=#2e86d4,fg=#0d1b26,bold] #S #[bg=#0d1b26,fg=#2e86d4] "

# Lado derecho: host + hora
set -g status-right-length 60
set -g status-right "#[fg=#5bb8ff] #H #[fg=#a8e6c0]  %H:%M "

# Ventana activa
setw -g window-status-current-format "#[bg=#3dba6f,fg=#0d1b26,bold] #I:#W#F "
setw -g window-status-format         "#[fg=#a8e6c0] #I:#W#F "

# Bordes de paneles
set -g pane-border-style        "fg=#2d4455"
set -g pane-active-border-style "fg=#2e86d4"

# ── Mensajes ──────────────────────────────────────────────────────────────────
set -g message-style "bg=#e0a020,fg=#0d1b26,bold"
